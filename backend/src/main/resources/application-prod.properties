# Perfil PROD — somente COMPORTAMENTO. Valores/segredos vem de variaveis de ambiente
# (resolvidas pelos placeholders ${...} em application.properties).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.sql.init.mode=never

storage.s3.ssl.trust-all=false

security.hsts.enabled=true
management.endpoints.web.exposure.include=health
