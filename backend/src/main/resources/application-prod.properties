spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

api.security.token.secret=${JWT_SECRET}

cors.origins=${CORS_ORIGINS}

# ─── Storage S3 (Garage) ───────────────────────────────────────────────
storage.s3.endpoint=${S3_ENDPOINT:https://s3.ltech.app.br}
storage.s3.region=${S3_REGION:us-east-1}
storage.s3.access-key=${S3_ACCESS_KEY}
storage.s3.secret-key=${S3_SECRET_KEY}
storage.s3.bucket=${S3_BUCKET:aluguel-motos}
storage.s3.public-base-url=${S3_PUBLIC_BASE_URL:https://aluguel-motos.web.ltech.app.br}
storage.s3.path-style-access=${S3_PATH_STYLE:true}
storage.s3.auto-create-bucket=${S3_AUTO_CREATE_BUCKET:true}
storage.s3.max-file-size=${S3_MAX_FILE_SIZE:5MB}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}