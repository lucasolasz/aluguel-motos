spring.application.name=backend

# ─── Perfil + .env ──────────────────────────────────────────────────────────
# Perfil define COMPORTAMENTO (ver application-{dev,prod}.properties).
# .env (gitignored) define VALORES/segredos. optional: nao falha se ausente (ex: prod usa env vars reais).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.config.import=optional:file:.env[.properties]

# ─── Comum ────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Banco ────────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}

# ─── Segurança ────────────────────────────────────────────────────────────────
api.security.token.secret=${JWT_SECRET}
cors.origins=${CORS_ORIGINS:http://localhost:3000}
security.encryption.key=${ENCRYPTION_KEY}

# ─── Storage S3 (Garage) ───────────────────────────────────────────────────────
# Valores nao-secretos com default de dev; segredos sem default (exigem .env/env var).
storage.s3.endpoint=${S3_ENDPOINT:https://s3.ltech.app.br}
storage.s3.region=${S3_REGION:us-east-1}
storage.s3.access-key=${S3_ACCESS_KEY}
storage.s3.secret-key=${S3_SECRET_KEY}
storage.s3.bucket=${S3_BUCKET:aluguel-motos}
storage.s3.public-base-url=${S3_PUBLIC_BASE_URL:https://bucketaluguelmotos.ltech.app.br}
storage.s3.path-style-access=${S3_PATH_STYLE:true}
storage.s3.auto-create-bucket=${S3_AUTO_CREATE_BUCKET:true}
storage.s3.max-file-size=${S3_MAX_FILE_SIZE:5MB}
# Bypass de cert TLS: padrao seguro false. Liga so via .env na maquina atras de MITM (tribunal).
storage.s3.ssl.trust-all=${S3_SSL_TRUST_ALL:false}

# Limites do multipart do servlet (cap rigido; o de negocio e storage.s3.max-file-size)
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}

# ─── Security ─────────────────────────────────────────────────────────────────
security.hsts.enabled=${SECURITY_HSTS_ENABLED:false}

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSURE:health,info}

